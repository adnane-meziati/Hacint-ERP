version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      target: prod
    command: gunicorn hacint.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    volumes:
      - media:/app/media
      - static:/app/staticfiles
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: hacint.settings.prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      target: prod
    command: celery -A hacint worker -l info --concurrency 4
    volumes:
      - media:/app/media
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: hacint.settings.prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      target: prod
    command: celery -A hacint beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: hacint.settings.prod
    restart: unless-stopped
    depends_on:
      - worker

  frontend:
    build:
      context: ./frontend
      target: prod
    volumes:
      - frontend_dist:/app/dist

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media:/app/media:ro
      - static:/app/staticfiles:ro
      - frontend_dist:/app/dist:ro
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    depends_on:
      - web

volumes:
  db_data:
  media:
  static:
  frontend_dist:
