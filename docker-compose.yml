services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hacint}
      POSTGRES_USER: ${POSTGRES_USER:-hacint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hacint}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hacint}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      target: dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media:/app/media
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: hacint.settings.dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      target: dev
    command: celery -A hacint worker -l info
    volumes:
      - ./backend:/app
      - media:/app/media
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: hacint.settings.dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      target: dev
    command: celery -A hacint beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: hacint.settings.dev
    depends_on:
      - worker

  frontend:
    build:
      context: ./frontend
      target: dev
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost/api
    ports:
      - "5175:5173"

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      - web
      - frontend

volumes:
  db_data:
  media:
